name: "CI/CD Pipeline"

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  lint:
    name: "Lint & Format"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Run Ruff Format Check
        run: uv run ruff format --check .

      - name: Run Ruff Lint Check
        run: uv run ruff check .

  # dependency-check:
  #   name: "Dependency Audit"
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Checkout Code
  #       uses: actions/checkout@v4

  #     - name: Run OSV-Scanner
  #       uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@v2.3.8
  #       with:
  #         scan-args: |
  #           --recursive
  #           ./

  build-and-push:
    name: "Build & Push ECR"
    needs: [lint, dependency-check]
    runs-on: ubuntu-latest
    environment: ${{ (github.event_name == 'workflow_dispatch' && inputs.environment) || (startsWith(github.ref, 'refs/tags/v') && 'prod' || 'dev') }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: us-west-2
          audience: sts.amazonaws.com

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          PUSH_TO_ECR: ${{ github.event_name != 'pull_request' }}
          REPOSITORY: "prefect-af-inciweb"
          IMAGE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
          SHA_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f docker/Dockerfile \
            -t $ECR_REGISTRY/$REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$REPOSITORY:$SHA_TAG \
            .

          if [ "$PUSH_TO_ECR" = "true" ]; then
            docker push $ECR_REGISTRY/$REPOSITORY:$IMAGE_TAG
            docker push $ECR_REGISTRY/$REPOSITORY:$SHA_TAG
          else
            echo "Skipping push for Pull Request validation build."
          fi
